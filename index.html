<style>

.inp{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:15px;outline:none}.inp:focus{border-color:var(--accent)}
textarea.inp{resize:none;height:60px}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none}.btn-blue{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff}
.action-btn{background:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:700;border:1px solid;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation}

.auto-badge{background:rgba(37,99,235,.15);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:7px 12px;font-size:12px;color:#93c5fd;margin-bottom:10px}

.filter-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center}

.month-selector{display:flex;align-items:center;gap:12px;margin-bottom:14px}.month-nav{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:7px 14px;font-size:17px;cursor:pointer}.month-label{flex:1;text-align:center;font-size:16px;font-weight:700}

.stat-val.blue{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.stat-val.red{color:#fca5a5}.stat-val.green{color:#10b981}.stat-label{font-size:10px;color:var(--text3)}

.rule-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:10px;padding:14px}.rule-title{font-size:11px;color:var(--orange);font-weight:700;margin-bottom:8px}.rule-item{font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid rgba(245,158,11,.1)}.rule-item:last-child{border-bottom:none}
.sub-tabs{display:flex;gap:7px;margin-bottom:14px}.sub-tab{flex:1;padding:8px 4px;font-size:11px;border:1px solid var(--border2);border-radius:7px;cursor:pointer;background:var(--bg2);color:var(--text3)}.sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.staff-row{background:var(--bg2);border-radius:10px;padding:11px 14px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.admin-badge{font-size:10px;color:var(--orange);background:rgba(245,158,11,.12);padding:2px 7px;border-radius:999px;margin-left:7px;border:1px solid rgba(245,158,11,.25)}
.add-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}.add-box-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.add-user-panel{background:rgba(37,99,235,.08);border:1px solid rgba(59,130,246,.25);border-radius:9px;padding:11px;margin-bottom:10px}
.empty-state{text-align:center;color:var(--text3);padding:36px 0;font-size:12px}
.sum-tabs{display:flex;gap:7px;margin-bottom:14px;position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0;margin-top:-14px}.sum-tab{flex:1;padding:10px 4px;font-size:11px;border:1px solid var(--border2);border-radius:7px;cursor:pointer;background:var(--bg2);color:var(--text3);text-align:center;touch-action:manipulation;-webkit-tap-highlight-color:rgba(59,130,246,.2);min-height:40px}.sum-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.cross-wrap{overflow-x:auto;margin-bottom:16px}.cross-table{width:100%;border-collapse:collapse;font-size:11px;min-width:300px}
.cross-table th{background:var(--bg3);color:var(--text3);padding:7px 8px;text-align:center;border:1px solid var(--border);font-weight:600;white-space:nowrap}.cross-table th.nc{text-align:left;min-width:64px}
.cross-table td{padding:7px 8px;border:1px solid var(--border);text-align:center;color:var(--text2);background:var(--bg2)}.cross-table td.nc{text-align:left;font-weight:600;color:var(--text);background:var(--bg3);white-space:nowrap}
.cross-table td.hot{color:#fca5a5;font-weight:700}.cross-table td.cold{color:var(--text3);font-size:10px}.cross-table tr.tot td{background:rgba(59,130,246,.08);color:#06b6d4;font-weight:700;border-top:2px solid var(--border2)}
.pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(59,130,246,.13) 0%,transparent 70%)}
.pin-card{width:100%;max-width:300px;background:rgba(13,20,36,.9);border:1px solid var(--border2);border-radius:20px;padding:28px;text-align:center}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:6px}.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--border2);border:1px solid var(--border2)}.pin-dot.filled{background:#06b6d4;border-color:#06b6d4}.pin-dot.error{background:#ef4444;border-color:#ef4444}
.pin-err{font-size:11px;color:#f87171;height:18px;margin-bottom:16px}.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px}
.pin-btn{padding:15px;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;color:var(--text);font-size:20px;font-weight:700;cursor:pointer}.pin-del{padding:15px;background:transparent;border:1px solid var(--border);border-radius:11px;color:var(--text3);font-size:17px;cursor:pointer}.pin-cancel{margin-top:8px;width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--text3);font-size:12px;cursor:pointer}
.print-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}.print-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
@media print{.header,.tab-nav,.form-pane,.sub-tabs,.filter-bar,.action-btn,.sum-tabs,.month-nav,.no-print{display:none!important}body{background:#fff!important;color:#000!important}.page,.list-pane{height:auto!important;overflow:visible!important}.ecard{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}}

<script>

const SUPABASE_URL = 'https://kvoplwkwsfmtqrtrjipo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2b3Bsd2t3c2ZtdHFydHJqaXBvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzUwMTQ4MywiZXhwIjoyMDg5MDc3NDgzfQ.I7Kz00gcmoDKJXXJEYDE3GwC_NlKx30IjzNRNnJ-oUg';
const ADMIN_PIN = '1234';
const OFFICES = ["アンジュールメディカルケア","アンジュール訪問介護事業所","アンジュール"];
var SERVICES = ["訪問","営業","会議","事務","移動","デイ業務"];
const DOW = ["日","月","火","水","木","金","土"];

async function sbFetch(path, opts) {
  opts = opts || {};
  var h = {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
  if (opts.headers) Object.assign(h, opts.headers);
  var res = await fetch(SUPABASE_URL+"/rest/v1/"+path, {method:opts.method||"GET",headers:h,body:opts.body});
  if (!res.ok) { console.error("Supabase error:", await res.text()); return null; }
  var txt = await res.text(); return txt ? JSON.parse(txt) : [];
}
function dbGetAll(t) { return sbFetch(t+"?select=*"); }
function dbInsert(t,r) { return sbFetch(t,{method:"POST",body:JSON.stringify(r)}); }
function dbUpdate(t,id,r) { return sbFetch(t+"?id=eq."+id,{method:"PATCH",body:JSON.stringify(r)}); }
function dbDelete(t,id) { return sbFetch(t+"?id=eq."+id,{method:"DELETE"}); }

function today() { return new Date().toISOString().split("T")[0]; }
function thisMonth() { var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function toMins(t) { if(!t)return 0; var p=t.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function minsToStr(m) {
  if(!m||m<=0)return "0分";
  var h=Math.floor(Math.abs(m)/60),mn=Math.abs(m)%60;
  return h>0?(mn>0?h+"時間"+mn+"分":h+"時間"):mn+"分";
}
function calcVisit(svc,s,e){return svc!=="訪問"?0:Math.max(0,toMins(e)-toMins(s));}
function calcOT(svc,office,date,s,e){
  if(svc!=="訪問")return 0;
  var sm=toMins(s),em=toMins(e),dur=Math.max(0,em-sm);
  if(!dur)return 0;
  var dow=new Date(date+"T00:00:00").getDay(),isWE=(dow===0||dow===6);
  if(office==="アンジュールメディカルケア"){
    if(isWE)return dur;
    var ot=0;
    if(sm<510)ot+=Math.min(510,em)-sm;
    if(em>1050)ot+=em-Math.max(1050,sm);
    return Math.max(0,ot);
  }
  if(office==="アンジュール訪問介護事業所")return isWE?dur:0;
  return 0;
}

var S={
  staff:[],users:[],entries:[],
  currentUser:null,tab:"home",adminTab:"list",
  summaryMonth:thisMonth(),summaryView:"month",
  editingId:null,filterStaff:"",filterMonth:thisMonth(),
  showAddUser:false,userShowAll:false,openStaff:null,
  printStaff:"",printDateFrom:"",printDateTo:"",
  pinStep:false,pinInput:"",pinError:false,pendingUser:null,
  loading:false,_tt:null,
  form:null,
  showAddService:false
};

function isAdmin(){var s=S.staff.find(function(x){return x.name===S.currentUser;});return s?s.isAdmin:false;}
function myOffice(){var s=S.staff.find(function(x){return x.name===S.currentUser;});return s?(s.office||""):"";}

function render(){
  var app=document.getElementById("app");if(!app)return;
  try{
    if(S.loading){app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#060a14"><div class="spin"></div><div style="font-size:13px;color:#475569">読み込み中...</div></div>';return;}
    if(S.pinStep){app.innerHTML=renderPin();}
    else if(!S.currentUser){app.innerHTML=renderLogin();}
    else{app.innerHTML=renderApp();}
    bind();
  }catch(err){
    console.error("render error:",err);
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060a14;color:#e2e8f0;padding:24px;text-align:center"><div><div style="font-size:18px;margin-bottom:12px">エラー</div><div style="font-size:11px;color:#475569">'+err.message+'</div></div></div>';
  }
}

function showToast(msg){
  clearTimeout(S._tt);
  var old=document.querySelector(".toast");if(old)old.remove();
  var t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);S._tt=setTimeout(function(){t.remove();},2500);
}

async function syncAll(){
  S.loading=true;render();
  try{
    var r=await Promise.all([dbGetAll("staff"),dbGetAll("users"),dbGetAll("entries")]);
    var staff=r[0],users=r[1],entries=r[2];
    if(staff&&staff.length>0)S.staff=staff.map(function(x){return {name:x.name,isAdmin:x.is_admin||false,office:x.office||"",_id:x.id};});
    if(users&&users.length>0)S.users=users.map(function(x){return {name:x.name,office:x.office||"",_id:x.id};});
    if(entries&&entries.length>0)S.entries=entries.map(function(x){return {id:String(x.id),date:x.date||"",staffName:x.staff_name||"",userName:x.user_name||"",office:x.office||"",start:x.start_time||"",end:x.end_time||"",service:x.service||"訪問",memo:x.memo||"",visitTime:x.visit_time||0,overtime:x.overtime||0};});
  }catch(err){console.error("syncAll error:",err);}
  S.loading=false;render();
}

function initForm(){
  if(!S.form)S.form={date:today(),staffName:S.currentUser||"",userName:"",office:"",start:"",end:"",service:"訪問",memo:""};
}

function renderLogin(){
  var opts=S.staff.map(function(s){return "<option value=\""+s.name+"\">"+s.name+(s.isAdmin?" ▸ 管理者":"")+"</option>";}).join("");
  return "<div class=\"login-screen\"><div class=\"brand\">Unjour</div><div class=\"tagline\">業 務 日 誌 シ ス テ ム</div><div class=\"login-card\"><div style=\"font-size:11px;color:#475569;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:8px\"><span style=\"flex:1;height:1px;background:#1e2d45\"></span>ログイン<span style=\"flex:1;height:1px;background:#1e2d45\"></span></div><div class=\"field\"><div class=\"field-label\">職員を選択</div><select id=\"loginSel\" class=\"inp\"><option value=\"\">-- 選択してください --</option>"+opts+"</select></div><button class=\"btn btn-blue\" id=\"loginBtn\" style=\"margin-top:8px\">ログイン →</button></div></div>";
}

function renderPin(){

  var sOpts=S.staff.map(function(s){return "<option value=\""+e(s.name)+"\""+( s.name===S.filterStaff?" selected":"")+">"+e(s.name)+"</option>";}).join("");
  var months=[],seen={};
  S.entries.forEach(function(x){var m=x.date?x.date.slice(0,7):"";if(m&&!seen[m]){seen[m]=1;months.push(m);}});
  months.sort(function(a,b){return b.localeCompare(a);});
  var mOpts=months.map(function(m){return "<option value=\""+m+"\""+( m===S.filterMonth?" selected":"")+">"+m.replace("-","年")+"月</option>";}).join("");
  var clearBtn=(S.filterStaff||S.filterMonth)?"<button id=\"clearFilter\" style=\"background:none;border:none;color:#475569;font-size:12px;cursor:pointer;padding:0 4px\">✕</button>":"";

// Global event delegation - handles all dynamic buttons
document.addEventListener("touchend", function(ev){
  var t = ev.target;
  if(t.dataset.sview){ev.preventDefault();S.summaryView=t.dataset.sview;render();return;}
  if(t.dataset.atab){ev.preventDefault();S.adminTab=t.dataset.atab;render();return;}
  if(t.dataset.tab){ev.preventDefault();S.tab=t.dataset.tab;render();return;}
},{passive:false});
document.addEventListener("click", function(ev){
  var t = ev.target;
  if(t.dataset.sview){S.summaryView=t.dataset.sview;render();return;}
  if(t.dataset.atab){S.adminTab=t.dataset.atab;render();return;}
  if(t.dataset.tab){S.tab=t.dataset.tab;render();return;}
});

function doAddService(){
  var el=document.getElementById("newServiceName");
  var name=el?el.value.trim():"";
  if(!name){showToast("業務名を入力してください");return;}
  if(SERVICES.indexOf(name)>=0){showToast("既に存在します");return;}
  SERVICES.push(name);
  S.showAddService=false;
  showToast(name+" を追加しました");
  render();
}

function doAddStaff(){
  var nameEl=document.getElementById("newStaffName");
  var admEl=document.getElementById("newStaffAdmin");
  var offEl=document.getElementById("newStaffOffice");
  var name=nameEl?nameEl.value.trim():"";
  var adm=admEl?admEl.checked:false;
  var office=offEl?offEl.value:"";
  if(!name){alert("名前を入力してください");return;}
  if(S.staff.find(function(s){return s.name===name;})){alert("同じ名前が既にいます");return;}
  dbInsert("staff",{name:name,is_admin:adm,office:office}).then(function(r){
    if(r){alert(name+"を追加しました");}else{alert("エラーが発生しました");}
    syncAll();
  }).catch(function(e){alert("エラー:"+e.message);});
}

function doAddUser(){
  var nameEl=document.getElementById("newUserName");
  var offEl=document.getElementById("newUserOffice");
  var name=nameEl?nameEl.value.trim():"";
  var office=offEl?offEl.value:"";

function doAddUserInline(){
  var name=document.getElementById("newUserName")?document.getElementById("newUserName").value.trim():"";

function doDelStaff(name){
  var s=S.staff.find(function(s){return s.name===name;});
  if(s&&s._id){dbDelete("staff",s._id).then(function(){showToast(name+" を削除しました");syncAll();});}
}

function doDelUser(name){
  var u=S.users.find(function(u){return u.name===name;});
  if(u&&u._id){dbDelete("users",u._id).then(function(){showToast(name+" を削除しました");syncAll();});}
}

function doDelEntry(id){
  var x=S.entries.find(function(x){return x.id===id;});
  if(x){
    S.entries=S.entries.filter(function(e){return e.id!==id;});
    render();
    dbDelete("entries",x.id).then(function(){
      showToast("削除しました");
      syncAll();
    }).catch(function(e){
      showToast("エラー:"+e.message);
      syncAll();
    });
  }
}

function doCopyEntry(id){
  var x=S.entries.find(function(x){return x.id===id;});if(!x)return;
  dbInsert("entries",{date:today(),staff_name:x.staffName,user_name:x.userName,office:x.office,start_time:x.start,end_time:x.end,service:x.service,memo:x.memo,visit_time:calcVisit(x.service,x.start,x.end),overtime:calcOT(x.service,x.office,today(),x.start,x.end)}).then(function(){showToast("コピーしました");syncAll();});

function doSave(){
  initForm();var f=S.form;
  var dateEl=document.getElementById("fDate");
  var staffEl=document.getElementById("fStaff");
  var userEl=document.getElementById("fUser");
  var startEl=document.getElementById("fStart");
  var endEl=document.getElementById("fEnd");
  var svcEl=document.getElementById("fService");
  var memoEl=document.getElementById("fMemo");
  if(dateEl)f.date=dateEl.value||f.date;
  if(staffEl&&staffEl.value)f.staffName=staffEl.value;
  if(userEl)f.userName=userEl.value;
  if(startEl)f.start=startEl.value;
  if(endEl)f.end=endEl.value;
  if(svcEl&&svcEl.value)f.service=svcEl.value;
  if(memoEl)f.memo=memoEl.value;
  var u=S.users.find(function(u){return u.name===f.userName;});if(u)f.office=u.office;
  if(!f.date||!f.staffName||!f.service){showToast("日付・職員・業務は必須です");return;}
  var vt=calcVisit(f.service,f.start,f.end),ot=calcOT(f.service,f.office,f.date,f.start,f.end);
  var row={date:f.date,staff_name:f.staffName,user_name:f.userName,office:f.office||"",start_time:f.start,end_time:f.end,service:f.service,memo:f.memo,visit_time:vt,overtime:ot};
  dbInsert("entries",row).then(function(r){
    showToast("保存しました ✓");
    S.editingId=null;S.form=null;S.showAddUser=false;
    syncAll();
  }).catch(function(e){showToast("エラー: "+e.message);});
}

function refreshCalc(){
  try{
    if(!S.form)return;
    var f=S.form;
    var startEl=document.getElementById("fStart");
    var endEl=document.getElementById("fEnd");
    if(startEl)f.start=startEl.value;
    if(endEl)f.end=endEl.value;
    var show=f.service==="訪問"&&f.start&&f.end&&toMins(f.end)>toMins(f.start);
    var box=document.querySelector(".calc-box");
    if(!show){if(box)box.remove();return;}
    var vm=calcVisit(f.service,f.start,f.end),ot=calcOT(f.service,f.office,f.date,f.start,f.end);
    if(box){box.innerHTML="<div style=\"color:#6ee7b7\">⏱ 訪問<br><strong style=\"font-size:15px\">"+minsToStr(vm)+"</strong></div><div style=\"color:"+(ot>0?"#fca5a5":"#6ee7b7")+"\" >🕐 残業<br><strong style=\"font-size:15px\">"+minsToStr(ot)+"</strong></div>";}
    else render();
  }catch(e){console.error("refreshCalc error:",e);}
}

syncAll().catch(function(err){console.error(err);S.loading=false;render();});
